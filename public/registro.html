<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - SIAP Automator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #66B539;
      --green-dark: #4a8a28;
      --dark: #151B1F;
      --white: #ffffff;
      --gray: #f5f7f4;
      --text: #2d3436;
      --text-dim: #636e72;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      background: var(--white);
    }

    .registro-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: linear-gradient(135deg, #f8fff5 0%, #ffffff 60%, #f0fae8 100%);
    }

    .registro-card {
      background: var(--white);
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }

    .registro-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .registro-header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .registro-header p {
      color: var(--text-dim);
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: var(--text);
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(102, 181, 57, 0.1);
    }

    .registro-btn {
      width: 100%;
      padding: 12px;
      background: var(--green);
      color: var(--white);
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      margin-top: 10px;
    }

    .registro-btn:hover {
      background: var(--green-dark);
      transform: translateY(-1px);
    }

    .registro-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }

    .error-message {
      color: #d32f2f;
      font-size: 14px;
      margin-bottom: 15px;
      padding: 10px;
      background: #ffebee;
      border-radius: 8px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      color: #2e7d32;
      font-size: 14px;
      margin-bottom: 15px;
      padding: 10px;
      background: #e8f5e9;
      border-radius: 8px;
      display: none;
    }

    .success-message.show {
      display: block;
    }

    .registro-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: var(--text-dim);
    }

    .registro-footer a {
      color: var(--green);
      text-decoration: none;
      font-weight: 600;
    }

    .registro-footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="registro-container">
    <div class="registro-card">
      <div class="registro-header">
        <h1>SIAP Automator</h1>
        <p>Crie sua conta</p>
      </div>

      <div class="error-message" id="errorMessage"></div>
      <div class="success-message" id="successMessage"></div>

      <form id="registroForm">
        <div class="form-group">
          <label for="name">Nome</label>
          <input type="text" id="name" name="name" required placeholder="Seu nome completo">
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="seu@email.com">
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" name="password" required placeholder="••••••••">
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirmar Senha</label>
          <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="••••••••">
        </div>

        <button type="submit" class="registro-btn" id="registroBtn">Registrar</button>
      </form>

      <div class="registro-footer">
        Já tem uma conta? <a href="/login">Faça login aqui</a>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('registroForm');
    const errorMessage = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');
    const registroBtn = document.getElementById('registroBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMessage.classList.remove('show');
      successMessage.classList.remove('show');

      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        errorMessage.textContent = 'As senhas não conferem';
        errorMessage.classList.add('show');
        return;
      }

      if (password.length < 6) {
        errorMessage.textContent = 'A senha deve ter pelo menos 6 caracteres';
        errorMessage.classList.add('show');
        return;
      }

      registroBtn.disabled = true;
      registroBtn.textContent = 'Registrando...';

      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            password: password
          })
        });

        const data = await response.json();

        if (response.ok) {
          successMessage.textContent = 'Registro realizado! Redirecionando para o dashboard...';
          successMessage.classList.add('show');
          // Aguarda 1.5 segundos e redireciona
          setTimeout(() => {
            window.location.href = '/dashboard';
          }, 1500);
        } else {
          errorMessage.textContent = data.erro || 'Erro ao registrar';
          errorMessage.classList.add('show');
          registroBtn.disabled = false;
          registroBtn.textContent = 'Registrar';
        }
      } catch (err) {
        errorMessage.textContent = 'Erro de conexão. Tente novamente.';
        errorMessage.classList.add('show');
        registroBtn.disabled = false;
        registroBtn.textContent = 'Registrar';
      }
    });
  </script>
</body>
</html>
